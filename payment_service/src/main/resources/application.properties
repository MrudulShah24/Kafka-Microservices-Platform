spring.application.name=payment_service

server.port=8081

# KAFKA CONFIG
spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=payment-group

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.value.default.type=com.mrudul.payment_service.dto.OrderEvent

spring.kafka.consumer.properties.spring.json.use.type.headers=false


# POSTGRESQL CONFIG
spring.datasource.url=jdbc:postgresql://postgres:5432/orderdb

spring.datasource.username=postgres

spring.datasource.password=postgres


# JPA CONFIG
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.kafka.listener.default-retry-topic-enabled=false
spring.kafka.listener.concurrency=1
spring.kafka.listener.type=single